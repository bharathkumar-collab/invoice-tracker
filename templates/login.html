<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvoiceFlow – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c; --paper: #faf8f4; --cream: #f2efe8;
    --accent: #c8522a; --muted: #8a8278; --border: #ddd9d0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(200,82,42,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(184,154,78,0.06) 0%, transparent 50%);
  }
  .auth-card {
    background: var(--paper); border-radius: 20px; padding: 48px 44px;
    width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  .brand { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); margin-bottom: 4px; }
  .brand span { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--muted); margin-bottom: 36px; font-family: 'DM Mono', monospace; }
  .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 2px solid var(--border); }
  .tab {
    padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px;
    font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--ink);
    background: white; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  .btn-submit {
    width: 100%; padding: 13px; background: var(--accent); color: white;
    border: none; border-radius: 9px; font-size: 15px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-submit:hover { background: #b04520; transform: translateY(-1px); }
  .btn-submit:active { transform: none; }
  .error-msg { background: #fde8e6; color: #c0392b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  .panel { display: none; }
  .panel.active { display: block; }
  .divider { text-align: center; color: var(--muted); font-size: 12px; margin: 10px 0; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="brand">Invoice<span>Flow</span></div>
  <div class="tagline">Professional Invoice Manager</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" onclick="doLogin()">Sign In →</button>
  </div>

  <!-- REGISTER -->
  <div class="panel" id="panel-register">
    <div class="form-group">
      <label>Business / Your Name</label>
      <input type="text" id="r-biz" placeholder="Acme Freelance Studio">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="r-pass" placeholder="Choose a strong password" autocomplete="new-password">
    </div>
    <button class="btn-submit" onclick="doRegister()">Create Account →</button>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-register').classList.toggle('active', tab==='register');
  document.getElementById('error-msg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!email || !password) { showError('Please fill in all fields'); return; }
  const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
  const data = await res.json();
  if (!res.ok) { showError(data.error); return; }
  window.location.reload();
}

async function doRegister() {
  const bizName = document.getElementById('r-biz').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  if (!bizName || !email || !password) { showError('Please fill in all fields'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
  const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password, bizName}) });
  const data = await res.json();
  if (!res.ok) { showError(data.error); return; }
  window.location.reload();
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('panel-login').classList.contains('active')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
